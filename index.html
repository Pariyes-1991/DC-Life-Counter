<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Draw Seven Life Counter</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --white:      #f0f4ff;
    --blue:       #1a5fb4;
    --blue-mid:   #2563a8;
    --blue-light: #4a90d9;
    --blue-pale:  #c8dcf5;
    --red:        #c0392b;
    --red-light:  #e74c3c;
    --navy:       #0d2145;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--navy);
    font-family: 'Rajdhani', sans-serif;
  }

  .app {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100dvh;
    position: relative;
  }

  /* ── Divider ── */
  .divider {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 4px;
    background: linear-gradient(90deg,
      transparent,
      var(--red) 10%,
      var(--red-light) 25%,
      var(--white) 50%,
      var(--blue-light) 75%,
      var(--blue) 90%,
      transparent);
    z-index: 10;
    box-shadow: 0 0 14px rgba(74,144,217,0.6), 0 0 30px rgba(74,144,217,0.2);
  }

  .divider-gem {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 40px; height: 40px;
    background: radial-gradient(circle at 38% 32%, #ffffff, var(--blue-light), var(--blue));
    border-radius: 50%;
    border: 2.5px solid var(--white);
    box-shadow: 0 0 18px rgba(74,144,217,0.9), 0 0 40px rgba(74,144,217,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    color: var(--navy);
    z-index: 11;
    cursor: pointer;
    transition: transform 0.15s;
    font-weight: 900;
  }
  .divider-gem:active { transform: translate(-50%, -50%) scale(0.87); }

  /* ── Player zones ── */
  .player {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .player.top {
    transform: rotate(180deg);
    background:
      radial-gradient(ellipse at 50% 75%, rgba(26,95,180,0.2) 0%, transparent 65%),
      linear-gradient(180deg, #0d2145 0%, #112a55 100%);
  }

  .player.bottom {
    background:
      radial-gradient(ellipse at 50% 75%, rgba(26,95,180,0.2) 0%, transparent 65%),
      linear-gradient(180deg, #0d2145 0%, #112a55 100%);
  }

  /* tri-color top stripe */
  .player::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg,
      var(--red) 0%,
      var(--red) 33%,
      var(--white) 33%,
      var(--white) 66%,
      var(--blue) 66%,
      var(--blue) 100%);
    opacity: 0.9;
    pointer-events: none;
  }

  /* Watermark */
  .rune-bg {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 170px;
    color: rgba(74,144,217,0.05);
    pointer-events: none;
  }

  /* Side lines */
  .side-line {
    position: absolute;
    top: 8%; bottom: 8%;
    width: 2px;
    background: linear-gradient(180deg, transparent, rgba(74,144,217,0.25), transparent);
    pointer-events: none;
  }
  .side-line.left  { left: 14px; }
  .side-line.right { right: 14px; }

  /* ── Hit zones ── */
  .hit-zone {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.12s;
  }

  .hit-zone.plus  { background: linear-gradient(180deg, rgba(74,144,217,0.10) 0%, transparent 100%); }
  .hit-zone.minus { background: linear-gradient(0deg, rgba(192,57,43,0.10) 0%, transparent 100%); }
  .hit-zone.plus:active  { background: rgba(74,144,217,0.26); }
  .hit-zone.minus:active { background: rgba(192,57,43,0.26); }

  .hit-icon {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    color: rgba(200,220,245,0.3);
    transition: color 0.1s, transform 0.1s;
  }
  .hit-zone:active .hit-icon {
    color: var(--white);
    transform: scale(1.4);
  }

  /* ── Center display ── */
  .center-panel {
    position: absolute;
    left: 0; right: 0;
    top: 50%; transform: translateY(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .life-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(110px, 27vw, 158px);
    color: var(--white);
    line-height: 0.88;
    letter-spacing: 6px;
    text-shadow:
      0 0 28px rgba(74,144,217,0.75),
      0 0 70px rgba(74,144,217,0.25),
      0 4px 8px rgba(0,0,0,0.7);
  }

  .life-number.bump-up   { animation: bumpUp   0.22s ease-out; }
  .life-number.bump-down { animation: bumpDown 0.22s ease-out; }

  @keyframes bumpUp {
    0%  { transform: scale(1);    color: var(--white); }
    45% { transform: scale(1.12); color: #60d8ff; text-shadow: 0 0 35px rgba(60,200,255,0.95); }
    100%{ transform: scale(1);    color: var(--white); }
  }
  @keyframes bumpDown {
    0%  { transform: scale(1);    color: var(--white); }
    45% { transform: scale(0.9);  color: #ff6b6b; text-shadow: 0 0 35px rgba(255,80,80,0.95); }
    100%{ transform: scale(1);    color: var(--white); }
  }

  /* ── Timer ── */
  .timer-area {
    position: absolute;
    bottom: 14px;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    pointer-events: all;
  }

  .timer-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 7.5vw, 42px);
    color: var(--blue-pale);
    letter-spacing: 6px;
    text-shadow: 0 0 10px rgba(74,144,217,0.5);
    transition: color 0.3s;
  }
  .timer-display.warning { color: #f5a623; text-shadow: 0 0 12px rgba(245,166,35,0.7); }
  .timer-display.danger  { color: var(--red-light); text-shadow: 0 0 14px rgba(231,76,60,0.8); animation: pulse-red 0.75s infinite; }

  @keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .timer-controls { display: flex; gap: 9px; }

  .timer-btn {
    background: rgba(240,244,255,0.07);
    border: 1.5px solid rgba(74,144,217,0.35);
    color: var(--blue-pale);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2.5px;
    padding: 5px 18px;
    border-radius: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  .timer-btn:active { background: rgba(74,144,217,0.22); border-color: var(--blue-light); color: var(--white); }

  .reset-btn {
    border-color: rgba(192,57,43,0.4);
    color: rgba(231,76,60,0.75);
  }
  .reset-btn:active { background: rgba(192,57,43,0.2) !important; border-color: var(--red-light) !important; color: var(--white) !important; }

  /* Flash overlay */
  .flash-overlay {
    position: fixed; inset: 0;
    background: rgba(74,144,217,0.15);
    pointer-events: none;
    opacity: 0;
    z-index: 100;
    transition: opacity 0.3s;
  }
  .flash-overlay.show { opacity: 1; }
</style>
</head>
<body>

<div class="flash-overlay" id="flashOverlay"></div>

<div class="app">

  <!-- TOP (rotated) -->
  <div class="player top" id="playerTop">
    <div class="rune-bg">⚔</div>
    <div class="side-line left"></div>
    <div class="side-line right"></div>

    <div class="hit-zone plus" onclick="changeLife('top', 1)">
      <span class="hit-icon">＋</span>
    </div>

    <div class="center-panel">
      <div class="life-number" id="lifeTop">20</div>
    </div>

    <div class="hit-zone minus" onclick="changeLife('top', -1)">
      <span class="hit-icon">－</span>
    </div>

    <div class="timer-area">
      <div class="timer-display" id="timerTop">50:00</div>
      <div class="timer-controls">
        <button class="timer-btn" id="startBtnTop" onclick="toggleTimer('top')">START</button>
        <button class="timer-btn reset-btn" onclick="resetSide('top')">RESET</button>
      </div>
    </div>
  </div>

  <!-- Divider -->
  <div class="divider">
    <div class="divider-gem" onclick="resetAll()">⟳</div>
  </div>

  <!-- BOTTOM -->
  <div class="player bottom" id="playerBottom">
    <div class="rune-bg">⚔</div>
    <div class="side-line left"></div>
    <div class="side-line right"></div>

    <div class="hit-zone plus" onclick="changeLife('bottom', 1)">
      <span class="hit-icon">＋</span>
    </div>

    <div class="center-panel">
      <div class="life-number" id="lifeBottom">20</div>
    </div>

    <div class="hit-zone minus" onclick="changeLife('bottom', -1)">
      <span class="hit-icon">－</span>
    </div>

    <div class="timer-area">
      <div class="timer-display" id="timerBottom">50:00</div>
      <div class="timer-controls">
        <button class="timer-btn" id="startBtnBottom" onclick="toggleTimer('bottom')">START</button>
        <button class="timer-btn reset-btn" onclick="resetSide('bottom')">RESET</button>
      </div>
    </div>
  </div>

</div>

<script>
  const state = {
    top:    { life: 20, seconds: 3000, running: false, interval: null },
    bottom: { life: 20, seconds: 3000, running: false, interval: null },
  };

  function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  function formatTime(s) {
    return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
  }

  function updateTimerDisplay(p) {
    const el = document.getElementById(`timer${cap(p)}`);
    const s = state[p].seconds;
    el.textContent = formatTime(s);
    el.className = 'timer-display';
    if (s <= 300) el.classList.add('danger');
    else if (s <= 600) el.classList.add('warning');
  }

  function toggleTimer(p) {
    const s = state[p];
    const btn = document.getElementById(`startBtn${cap(p)}`);
    if (s.running) {
      clearInterval(s.interval);
      s.running = false;
      btn.textContent = 'START';
    } else {
      if (s.seconds <= 0) return;
      s.running = true;
      btn.textContent = 'PAUSE';
      s.interval = setInterval(() => {
        if (s.seconds > 0) {
          s.seconds--;
          updateTimerDisplay(p);
        } else {
          clearInterval(s.interval);
          s.running = false;
          btn.textContent = 'START';
          updateTimerDisplay(p);
        }
      }, 1000);
    }
  }

  function resetSide(p) {
    clearInterval(state[p].interval);
    state[p].running = false;
    state[p].seconds = 3000;
    state[p].life = 20;
    document.getElementById(`startBtn${cap(p)}`).textContent = 'START';
    document.getElementById(`life${cap(p)}`).textContent = '20';
    updateTimerDisplay(p);
  }

  function changeLife(p, delta) {
    state[p].life += delta;
    const el = document.getElementById(`life${cap(p)}`);
    el.textContent = state[p].life;
    el.classList.remove('bump-up', 'bump-down');
    void el.offsetWidth;
    el.classList.add(delta > 0 ? 'bump-up' : 'bump-down');
  }

  function resetAll() {
    ['top','bottom'].forEach(p => resetSide(p));
    const f = document.getElementById('flashOverlay');
    f.classList.add('show');
    setTimeout(() => f.classList.remove('show'), 280);
  }

  updateTimerDisplay('top');
  updateTimerDisplay('bottom');
</script>
</body>
</html>
